<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂齡健康動 - 遊戲與結算</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-press { transition: transform 0.1s; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.5); }
        .btn-press:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0, 0, 0, 0.5); }
        
        /* 通知彈出動畫 */
        @keyframes slideUp {
            0% { transform: translateY(100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .toast-enter { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative p-6">

    <div class="flex justify-between items-center mb-6 z-10">
        <button onclick="window.location.href='games.html'" class="btn-press bg-zinc-700 text-white px-6 py-3 rounded-2xl text-xl font-bold border-b-4 border-zinc-900">
            〈 放棄並返回
        </button>
        <h1 class="text-3xl font-bold tracking-widest text-orange-400" id="game-title">打地鼠 (模擬)</h1>
        <div class="w-32"></div>
    </div>

    <div id="game-play-area" class="flex-1 flex flex-col items-center justify-center gap-8">
        <div class="text-[8rem] animate-bounce">🐹</div>
        <p class="text-3xl text-zinc-300 font-bold">遊戲進行中...</p>
        
        <button onclick="finishGame(85, 45.2)" class="bg-orange-500 text-white text-4xl font-bold px-12 py-8 rounded-[2rem] btn-press border-b-8 border-orange-700 shadow-xl">
            模擬：遊戲結束 (得分 85)
        </button>
    </div>

    <div id="game-result-area" class="hidden flex-1 flex flex-col items-center justify-center w-full max-w-2xl mx-auto z-20">
        <div class="bg-zinc-800 border-4 border-yellow-500 rounded-[3rem] p-12 w-full text-center shadow-2xl flex flex-col items-center">
            <div class="text-[6rem] mb-4">🎉</div>
            <h2 class="text-5xl font-black text-white mb-2 tracking-widest">太棒了！</h2>
            <p class="text-2xl text-zinc-400 font-bold mb-8">您已完成本次復健運動</p>
            
            <div class="bg-zinc-900 w-full py-8 rounded-3xl border-2 border-zinc-700 mb-8 shadow-inner">
                <p class="text-zinc-500 font-bold text-xl mb-2">本次得分</p>
                <div class="text-[6rem] font-black text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.3)] leading-none">
                    <span id="final-score">0</span>
                </div>
            </div>

            <button onclick="window.location.href='dashboard.html'" class="w-full bg-emerald-500 text-white text-3xl font-bold py-6 rounded-2xl btn-press border-b-8 border-emerald-700">
                返回大廳休息
            </button>
        </div>
    </div>

    <div id="family-notify-toast" class="hidden fixed bottom-8 left-0 right-0 px-6 z-50 flex justify-center pointer-events-none">
        <div class="bg-green-600/95 backdrop-blur-sm border-2 border-green-400 text-white px-8 py-5 rounded-full shadow-2xl flex items-center gap-4">
            <span class="text-3xl">📱</span>
            <span class="text-2xl font-bold tracking-wide" id="toast-msg">好成績已經自動傳送給家人囉！</span>
        </div>
    </div>

    <script>
        // 取得長輩資料庫 ID
        const elderId = localStorage.getItem('dbUserId');
        const gameName = document.getElementById('game-title').innerText.replace(' (模擬)', '');

        // 模擬遊戲結束邏輯
        function finishGame(score, angle) {
            // 1. 切換畫面
            document.getElementById('game-play-area').classList.add('hidden');
            document.getElementById('game-result-area').classList.remove('hidden');
            document.getElementById('game-result-area').classList.add('flex');
            
            // 2. 顯示分數
            document.getElementById('final-score').innerText = score;

            // 3. 觸發自動推播給家屬
            sendResultToFamily(score, angle);
        }

        // ✨ 方案 A：背景自動推播邏輯
        async function sendResultToFamily(score, angle) {
            if (!elderId) {
                console.warn("無法取得長輩 ID，略過發送通知");
                return;
            }

            try {
                // 呼叫我們在 app.py 寫好的推播端點
                const response = await fetch('/api/push_score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        elder_id: elderId,
                        game_name: gameName,
                        score: score,
                        angle: angle
                    })
                });

                const result = await response.json();

                // 若後端回傳成功，且有綁定家屬，則顯示溫馨提示
                if (result.success && !result.message.includes('無綁定家屬')) {
                    showFamilyToast();
                } else {
                    console.log("推播狀態：", result.message);
                }
            } catch (error) {
                // 背景發送失敗不應阻斷長輩操作，僅在 Console 報錯
                console.error("推播 API 呼叫失敗：", error);
            }
        }

        // 顯示溫馨通知的動畫控制
        function showFamilyToast() {
            const toast = document.getElementById('family-notify-toast');
            toast.classList.remove('hidden');
            toast.classList.add('toast-enter');

            // 5 秒後自動消失
            setTimeout(() => {
                toast.style.transition = 'opacity 0.5s ease-out, transform 0.5s ease-out';
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(20px)';
                setTimeout(() => toast.classList.add('hidden'), 500);
            }, 5000);
        }
    </script>
</body>
</html>
