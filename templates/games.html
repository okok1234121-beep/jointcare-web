<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>選擇運動項目</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        /* 遊戲卡片立體按壓效果 */
        .game-card {
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .game-card:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0 transparent !important;
        }
        /* 隱藏滾動條但保留滾動功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="p-8 h-screen flex flex-col overflow-hidden min-w-[1024px]">

    <!-- 頂部導覽列 -->
    <div class="flex justify-between items-center mb-8">
        <div class="flex gap-4">
            <button onclick="goBack()" class="bg-zinc-700 hover:bg-zinc-600 text-white text-2xl font-bold py-4 px-8 rounded-2xl border-2 border-zinc-500 flex items-center gap-2 shadow-lg">
                <span>⬅️</span> 返回大廳
            </button>
            <button id="btn-connect-second" onclick="connectSecondDevice()" class="bg-blue-600 hover:bg-blue-500 text-white text-2xl font-bold py-4 px-8 rounded-2xl border-2 border-blue-400 flex items-center gap-2 shadow-lg hidden">
                <span>🔗</span> 連接第二台設備
            </button>
        </div>
        <div class="text-right">
            <h1 class="text-4xl font-bold text-white tracking-wide">選擇運動</h1>
            <p id="mode-badge" class="text-2xl mt-2 text-zinc-400">讀取設備中...</p>
        </div>
    </div>

    <!-- 主要內容區：強制絕對左右分欄 -->
    <div class="flex-1 flex flex-row gap-8 overflow-hidden">
        
        <!-- 左側：約 65% 遊戲選擇清單 -->
        <div class="w-2/3 h-full overflow-y-auto no-scrollbar pb-6 pr-2">
            <!-- 強制雙排網格 -->
            <div id="games-container" class="grid grid-cols-2 gap-8">
                <!-- 遊戲卡片將由 JavaScript 動態生成 -->
            </div>
        </div>

        <!-- 右側：約 35% 好友最新動態 (強制顯示) -->
        <div class="w-1/3 bg-zinc-800 rounded-3xl border-2 border-zinc-700 flex flex-col h-full overflow-hidden shadow-2xl">
            <div class="bg-zinc-700 p-5 rounded-t-3xl border-b-2 border-zinc-600 shadow-md z-10">
                <h2 class="text-3xl font-bold text-white flex items-center gap-3">
                    <span class="text-4xl">🔥</span> 好友最新動態
                </h2>
            </div>
            
            <div class="flex-1 overflow-y-auto p-5 space-y-5 no-scrollbar bg-zinc-800/50" id="friends-activity">
                <!-- 好友動態卡片 -->
                <div class="bg-zinc-700/80 p-5 rounded-2xl flex items-center gap-5 border border-zinc-600">
                    <div class="text-6xl bg-zinc-600 p-3 rounded-full border-4 border-green-500 shadow-inner">👵</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-end mb-2">
                            <h3 class="text-3xl font-bold text-white">林阿嬤</h3>
                            <span class="text-lg text-zinc-400">10分鐘前</span>
                        </div>
                        <p class="text-xl text-zinc-300">玩了 <span class="text-orange-400 font-bold text-2xl">打地鼠</span></p>
                        <p class="text-3xl font-black text-yellow-400 mt-2 tracking-wide">85 分</p>
                    </div>
                </div>

                <div class="bg-zinc-700/80 p-5 rounded-2xl flex items-center gap-5 border border-zinc-600">
                    <div class="text-6xl bg-zinc-600 p-3 rounded-full border-4 border-blue-500 shadow-inner">👴</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-end mb-2">
                            <h3 class="text-3xl font-bold text-white">陳伯伯</h3>
                            <span class="text-lg text-zinc-400">1小時前</span>
                        </div>
                        <p class="text-xl text-zinc-300">玩了 <span class="text-blue-400 font-bold text-2xl">太極推手</span></p>
                        <p class="text-3xl font-black text-yellow-400 mt-2 tracking-wide">120 分</p>
                    </div>
                </div>

                <div class="bg-zinc-700/80 p-5 rounded-2xl flex items-center gap-5 border border-zinc-600">
                    <div class="text-6xl bg-zinc-600 p-3 rounded-full border-4 border-purple-500 shadow-inner">👩‍🦱</div>
                    <div class="flex-1">
                        <div class="flex justify-between items-end mb-2">
                            <h3 class="text-3xl font-bold text-white">王阿姨</h3>
                            <span class="text-lg text-zinc-400">昨天</span>
                        </div>
                        <p class="text-xl text-zinc-300">玩了 <span class="text-red-400 font-bold text-2xl">接蘋果</span></p>
                        <p class="text-3xl font-black text-yellow-400 mt-2 tracking-wide">95 分</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- 遊戲資料庫 ---
        const gamesData = [
            { 
                id: 'game1', 
                name: '打地鼠', 
                desc: '訓練反應速度', 
                icon: '🐹', 
                bg: 'bg-orange-500', 
                border: 'border-orange-700',
                shadow: 'shadow-[0_10px_0_#c2410c]',
                type: 'both',
                target: 'exercise_single.html' 
            },
            { 
                id: 'game2', 
                name: '接蘋果', 
                desc: '活動肩頸關節', 
                icon: '🍎', 
                bg: 'bg-red-500', 
                border: 'border-red-700',
                shadow: 'shadow-[0_10px_0_#b91c1c]',
                type: 'both', 
                target: 'exercise_multi.html' 
            },
            { 
                id: 'game3', 
                name: '切西瓜', 
                desc: '手臂揮擊訓練', 
                icon: '🍉', 
                bg: 'bg-green-500', 
                border: 'border-green-700',
                shadow: 'shadow-[0_10px_0_#15803d]',
                type: 'single', 
                target: 'exercise_single.html'
            },
            { 
                id: 'game4', 
                name: '太極推手', 
                desc: '手部穩定控制', 
                icon: '☯️', 
                bg: 'bg-blue-500', 
                border: 'border-blue-700',
                shadow: 'shadow-[0_10px_0_#1d4ed8]',
                type: 'single', 
                target: 'exercise_single.html'
            }
        ];

        // 頁面初始化
        window.onload = () => {
            let mode = localStorage.getItem('deviceMode');
            
            if (!mode) {
                console.warn('無法取得設備狀態。已切換為「預覽模式(多軸)」以便測試。');
                mode = 'multi'; 
            }

            const badge = document.getElementById('mode-badge');
            const btnConnectSecond = document.getElementById('btn-connect-second');
            if (mode === 'multi') {
                badge.innerHTML = '<span class="text-blue-400 font-bold">🟢 多軸設備已就緒</span>';
                if (btnConnectSecond) btnConnectSecond.classList.add('hidden');
            } else if (mode === 'dual') {
                badge.innerHTML = '<span class="text-green-400 font-bold">🟢 雙設備已就緒</span>';
                if (btnConnectSecond) btnConnectSecond.classList.add('hidden');
            } else {
                badge.innerHTML = '<span class="text-green-400 font-bold">🟢 單軸設備已就緒</span>';
                if (btnConnectSecond) btnConnectSecond.classList.remove('hidden');
            }

            renderGames(mode);
        };

        // 渲染遊戲卡片
        function renderGames(deviceMode) {
            const container = document.getElementById('games-container');
            container.innerHTML = ''; 

            const availableGames = gamesData.filter(game => {
                if (deviceMode === 'multi') {
                    return game.type === 'both'; 
                }
                return true; 
            });

            availableGames.forEach(game => {
                const cardHTML = `
                    <button onclick="startGame('${game.name}', '${game.target}')" 
                            class="game-card w-full ${game.bg} rounded-[2.5rem] p-8 flex flex-col items-center justify-center text-center border-4 ${game.border} ${game.shadow} h-[320px]">
                        <div class="text-[5.5rem] bg-white/20 w-40 h-40 rounded-full flex items-center justify-center mb-6 backdrop-blur-sm shadow-inner">
                            ${game.icon}
                        </div>
                        <h3 class="text-5xl font-bold text-white mb-3 tracking-widest">${game.name}</h3>
                        <p class="text-2xl text-white/90 font-bold">${game.desc}</p>
                    </button>
                `;
                container.innerHTML += cardHTML;
            });
        }

        // 返回大廳
        function goBack() {
            try { window.location.href = 'dashboard.html'; } 
            catch (error) { alert('準備返回大廳'); }
        }

        // 啟動遊戲
        function startGame(gameName, targetUrl) {
            alert(`準備啟動：${gameName}\n這將會跳轉至對應的遊戲或測量畫面！`);
            // try { window.location.href = targetUrl; } catch(e) {}
        }

        // 連接第二台設備
        async function connectSecondDevice() {
            try {
                // 模擬或執行藍牙連線
                const device = await navigator.bluetooth.requestDevice({ 
                    filters: [{ namePrefix: 'KneeHow' }], 
                    optionalServices: ['00000001-0000-1000-8000-00805f9b34fb'] 
                });
                
                // 檢查是否重複連線到第一台設備
                const firstDeviceId = localStorage.getItem('firstDeviceId');
                if (firstDeviceId && device.id === firstDeviceId) {
                    alert("⚠️ 您選擇到已經連線的第一台感測器了！請重新選擇另一台尚未連線的感測器。");
                    return; // 中斷，不繼續往下執行
                }
                
                // 根據第一台設備的設定，自動判別第二台是左還是右
                const firstLimb = localStorage.getItem('sensorLimb');
                let secondLimb = 'R'; // 預設右邊
                if (firstLimb === 'L') {
                    secondLimb = 'R';
                } else if (firstLimb === 'R') {
                    secondLimb = 'L';
                } else {
                    // 若沒有第一台的紀錄，先當作第一台是左，第二台是右
                    localStorage.setItem('sensorLimb', 'L');
                    secondLimb = 'R';
                }
                
                localStorage.setItem('sensorLimb2', secondLimb);
                localStorage.setItem('deviceMode', 'dual'); // 改為 dual，不影響多軸專屬功能
                
                alert(`第二台設備連接成功！自動判別為：${secondLimb === 'L' ? '左邊' : '右邊'}`);
                
                // 更新畫面
                document.getElementById('btn-connect-second').classList.add('hidden');
                const badge = document.getElementById('mode-badge');
                badge.innerHTML = '<span class="text-green-400 font-bold">🟢 雙設備已就緒</span>';
                renderGames('dual');

            } catch (e) { 
                alert("連線取消或失敗，請重新嘗試。"); 
            }
        }
    </script>
</body>
</html>
