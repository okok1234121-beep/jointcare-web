<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂齡健康動 - 我的好友</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Microsoft JhengHei', sans-serif; 
            overflow-x: hidden; 
            -webkit-tap-highlight-color: transparent; 
        }
        .giant-btn { transition: transform 0.1s; box-shadow: 0 10px 0 rgba(0, 0, 0, 0.5); }
        .giant-btn:active { transform: translateY(6px); box-shadow: 0 4px 0 rgba(0, 0, 0, 0.5); }
        .btn-press { transition: transform 0.1s; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.5); }
        .btn-press:active { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0, 0, 0, 0.5); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-10">

    <div class="bg-zinc-800 p-4 sticky top-0 z-40 shadow-lg border-b-2 border-zinc-700 flex justify-between items-center">
        <button onclick="goBack()" class="btn-press bg-zinc-600 text-white px-6 py-3 rounded-2xl text-2xl font-bold border-b-4 border-zinc-800">
            〈 返回大廳
        </button>
        <h1 class="text-3xl font-bold tracking-widest text-emerald-400">我的好友</h1>
        <div class="w-32"></div> </div>

    <div id="view-gateway" class="flex-1 w-full max-w-5xl mx-auto p-6 flex flex-row items-center justify-center gap-6">
        
        <button onclick="sendLineInvite()" class="giant-btn flex-1 bg-green-600 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-4 border-b-[8px] border-green-800 h-[300px]">
            <div class="text-6xl bg-green-500 p-4 rounded-3xl shadow-inner mb-2">💬</div>
            <h2 class="text-3xl font-bold text-white tracking-widest text-center">LINE 邀請</h2>
            <p class="text-lg text-green-100 font-bold text-center">傳送連結給家人</p>
        </button>

        <button onclick="openAddFriendModal()" class="giant-btn flex-1 bg-emerald-500 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-4 border-b-[8px] border-emerald-700 h-[300px]">
            <div class="text-6xl bg-emerald-400 p-4 rounded-3xl shadow-inner mb-2">➕</div>
            <h2 class="text-3xl font-bold text-white tracking-widest text-center">加入號碼</h2>
            <p class="text-lg text-emerald-100 font-bold text-center">輸入號碼連動</p>
        </button>

        <button onclick="showListView()" class="giant-btn flex-1 bg-indigo-500 rounded-[2rem] p-6 flex flex-col items-center justify-center gap-4 border-b-[8px] border-indigo-700 h-[300px]">
            <div class="text-6xl bg-indigo-400 p-4 rounded-3xl shadow-inner mb-2">👥</div>
            <h2 class="text-3xl font-bold text-white tracking-widest text-center">好友名單</h2>
            <p class="text-lg text-indigo-100 font-bold text-center">查看大家戰績</p>
        </button>

    </div>

    <div id="view-list" class="hidden flex-1 w-full max-w-2xl mx-auto p-6 flex flex-col gap-6">
        
        <button onclick="showGatewayView()" class="btn-press bg-zinc-700 text-white px-6 py-4 rounded-2xl text-2xl font-bold border-2 border-zinc-500 flex justify-center items-center gap-2 mb-2">
            <span>⤴️</span> 回到選項
        </button>

        <div class="bg-zinc-800 rounded-3xl p-6 border-2 border-zinc-700 shadow-xl">
            <h2 class="text-3xl text-zinc-100 font-bold mb-6 flex items-center gap-3">
                <span class="text-4xl">📋</span> 您的好友名單
            </h2>
            <div id="friends-list-container" class="flex flex-col gap-4">
                <div class="text-center text-zinc-500 text-2xl py-8 font-bold">資料載入中...</div>
            </div>
        </div>
    </div>

    <div id="modal-add-friend" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-zinc-800 border-4 border-emerald-500 rounded-[2.5rem] w-full max-w-lg p-8 shadow-2xl transform transition-transform scale-95 flex flex-col gap-6" id="add-friend-content">
            
            <h2 class="text-4xl font-bold text-center text-white mb-2">新增好友</h2>
            
            <div class="bg-zinc-900 rounded-3xl p-6 text-center border-2 border-zinc-700 flex justify-between items-center px-8">
                <span class="text-2xl text-zinc-400">您的好友碼：</span>
                <span class="text-5xl font-bold text-emerald-400 tracking-widest" id="my-uid-display">讀取中</span>
            </div>

            <hr class="border-zinc-600">

            <div class="text-center">
                <p class="text-2xl text-zinc-300 font-bold mb-4">請輸入朋友的好友碼：</p>
                <input type="number" id="friend-uid-input" placeholder="例如：105" 
                       class="w-full bg-zinc-700 text-white text-4xl p-6 rounded-2xl border-4 border-zinc-600 focus:outline-none focus:border-emerald-500 text-center mb-6">
            </div>

            <div class="flex gap-4 mt-2">
                <button onclick="closeAddFriendModal()" class="flex-1 bg-zinc-600 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-zinc-800">
                    取消
                </button>
                <button onclick="processAddFriend()" class="flex-1 bg-emerald-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-emerald-700">
                    送出邀請
                </button>
            </div>
        </div>
    </div>

    <div id="modal-incoming-request" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-zinc-800 border-4 border-yellow-500 rounded-[2.5rem] w-full max-w-md p-8 text-center shadow-2xl transform transition-transform scale-95 flex flex-col gap-6" id="incoming-request-content">
            <div class="text-8xl animate-bounce">🔔</div>
            <h2 class="text-4xl font-bold text-yellow-400 mb-2">新的好友邀請！</h2>
            
            <div class="bg-zinc-700 rounded-3xl p-6 border-2 border-zinc-600 mb-2">
                <div class="text-5xl mb-4">👤</div>
                <p class="text-3xl font-bold text-white" id="requester-name">讀取中...</p>
                <p class="text-xl text-zinc-400 mt-2">好友碼: <span id="requester-id">---</span></p>
            </div>
            
            <p class="text-2xl text-zinc-300 font-bold">請問您是否同意加入？</p>

            <div class="flex gap-4 mt-2">
                <button onclick="rejectRequest()" class="flex-1 bg-zinc-600 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-zinc-800">拒絕</button>
                <button onclick="acceptRequest()" class="flex-1 bg-emerald-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-emerald-700">🎉 同意</button>
            </div>
        </div>
    </div>

    <div id="custom-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-zinc-800 border-4 border-zinc-600 rounded-[2rem] w-full max-w-md p-8 text-center shadow-2xl transform transition-transform scale-95" id="modal-content">
            <div class="text-7xl mb-6" id="modal-icon">ℹ️</div>
            <h3 class="text-3xl font-bold text-white mb-8 leading-relaxed" id="modal-message">訊息內容</h3>
            <div class="flex justify-center gap-4" id="modal-buttons"></div>
        </div>
    </div>

    <script>
        let myUid = null;
        let pendingRequests = []; 
        let friendsList = [];     

        window.onload = async () => {
            myUid = localStorage.getItem('dbUserId');
            
            // 初始化 LIFF 供分享使用
            try {
                await liff.init({ liffId: "2009890664-Vovdl9LN" });
            } catch (e) { console.error("LIFF 初始化失敗", e); }

            if (!myUid) {
                document.getElementById('my-uid-display').innerText = "尚未同步";
                showSystemModal("⚠️", "找不到您的資料，請重新登入！", false, () => {
                    window.location.href = "login.html";
                });
                return;
            }
            document.getElementById('my-uid-display').innerText = myUid;
            fetchFriendsData(); // 載入真實好友清單
        };

        function goBack() { window.location.href = "app_core.html"; }

        // ✨ 方案 A：LINE 邀請核心邏輯 (修正變數與 Logging 機制)
        async function sendLineInvite() {
            const myName = localStorage.getItem('userName') || "您的家人";
            
            // 防呆：如果是在電腦版 LINE 或瀏覽器，明確跳出警告
            if (!liff.isApiAvailable('shareTargetPicker')) {
                showSystemModal("📱", "請在手機的 LINE 裡面開啟，才能傳送邀請給好友喔！", false);
                return;
            }
            
            // 系統層級防呆：確認變數存在
            if (!myUid) {
                showSystemModal("⚠️", "系統尚未取得您的識別碼，請重新整理網頁。", false);
                return;
            }

            try {
                const result = await liff.shareTargetPicker([
                    {
                        "type": "flex",
                        "altText": `${myName} 邀請您成為復健好友`,
                        "contents": {
                            "type": "bubble",
                            "body": {
                                "type": "box",
                                "layout": "vertical",
                                "contents": [
                                    { "type": "text", "text": "🏃 樂齡健康動", "weight": "bold", "color": "#22c55e", "size": "sm" },
                                    { "type": "text", "text": "復健好友邀請", "weight": "bold", "size": "xl", "margin": "md" },
                                    { "type": "text", "text": `${myName} 邀請您追蹤他的復健進度！點擊下方按鈕即可自動完成綁定。`, "wrap": true, "color": "#666666", "size": "sm", "margin": "md" }
                                ]
                            },
                            "footer": {
                                "type": "box",
                                "layout": "vertical",
                                "contents": [
                                    {
                                        "type": "button",
                                        "action": {
                                            "type": "uri",
                                            "label": "接受邀請",
                                            // 修改點：使用正確的全域變數 myUid
                                            "uri": `https://liff.line.me/2009890664-Vovdl9LN?invite_uid=${myUid}&invite_type=friend`
                                        },
                                        "style": "primary",
                                        "color": "#22c55e"
                                    }
                                ]
                            }
                        }
                    }
                ]);
                
                // 使用者成功選完好友並送出
                if (result) {
                    showSystemModal("✅", "邀請卡片已成功傳送！", false);
                } else {
                    // 使用者在選擇名單畫面按了右上角的「X」取消，不須顯示錯誤彈窗，僅做 Logging
                    console.log("使用者主動取消了分享動作。");
                }
            } catch (error) {
                // 真正的系統層級或 SDK 錯誤，必須記錄下來
                console.error("shareTargetPicker 執行發生異常:", error);
                showSystemModal("❌", "分享動作發生系統錯誤，請聯絡管理員", false);
            }
        }

        // 視圖切換
        function showListView() {
            document.getElementById('view-gateway').classList.add('hidden');
            document.getElementById('view-list').classList.remove('hidden');
            window.scrollTo(0, 0);
        }
        function showGatewayView() {
            document.getElementById('view-list').classList.add('hidden');
            document.getElementById('view-gateway').classList.remove('hidden');
        }

        // 完整的好友資料抓取與渲染
        async function fetchFriendsData() {
            const container = document.getElementById('friends-list-container');
            container.innerHTML = `<div class="text-center text-zinc-400 text-2xl py-8 font-bold">正在與伺服器連線...</div>`;
            try {
                const res = await fetch(`/api/friends/list?user_id=${myUid}`);
                const data = await res.json();
                if (data.success) {
                    pendingRequests = data.pending;
                    friendsList = data.friends;
                    renderFriendsList();
                    checkPendingRequests();
                } else {
                    container.innerHTML = `<div class="bg-red-900/30 p-6 rounded-2xl border-2 border-red-500 shadow-inner text-red-200">連線錯誤: ${data.message}</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="bg-red-900/30 p-6 rounded-2xl border-2 border-red-500 shadow-inner text-red-200">網路異常無法連接</div>`;
            }
        }

        function renderFriendsList() {
            const container = document.getElementById('friends-list-container');
            container.innerHTML = ""; 
            if (!friendsList || friendsList.length === 0) {
                container.innerHTML = `<div class="text-center text-zinc-400 text-2xl py-12 border-4 border-dashed border-zinc-600 rounded-3xl font-bold shadow-inner">名單空空的<br>趕快去加好友吧！</div>`;
                return;
            }
            friendsList.forEach(friend => {
                let recordsHtml = '';
                if (friend.records && friend.records.length > 0) {
                    recordsHtml = friend.records.map(r => `
                        <div class="flex justify-between items-center bg-zinc-900 p-4 rounded-2xl mb-3 border-2 border-zinc-700">
                            <span class="text-zinc-400 text-xl font-bold">${r.date}</span>
                            <span class="text-emerald-400 font-bold text-2xl">${r.game}</span>
                            <span class="text-yellow-400 font-black text-2xl">${r.score} 分</span>
                        </div>
                    `).join('');
                } else {
                    recordsHtml = `<div class="text-center text-zinc-500 py-4 text-xl font-bold">近七天無遊戲紀錄</div>`;
                }
                const card = document.createElement('div');
                card.className = "bg-zinc-700 rounded-3xl overflow-hidden border-2 border-zinc-600 shadow-lg mb-4";
                card.innerHTML = `
                    <div class="p-6 flex justify-between items-center cursor-pointer active:bg-zinc-600 transition-colors" onclick="toggleRecords(${friend.id})">
                        <div class="flex items-center gap-5">
                            <div class="w-16 h-16 bg-zinc-500 rounded-full flex items-center justify-center text-4xl border-2 border-zinc-400">👤</div>
                            <div>
                                <h3 class="text-3xl font-bold text-white mb-1">${friend.name}</h3>
                                <p class="text-zinc-400 text-lg font-bold">號碼: ${friend.id}</p>
                            </div>
                        </div>
                        <div class="flex items-center gap-6">
                            <span class="text-zinc-400 text-3xl transition-transform duration-300" id="arrow-${friend.id}">▼</span>
                            <button onclick="event.stopPropagation(); confirmDelete(${friend.id}, '${friend.name}')" class="bg-red-500 text-white p-4 rounded-2xl btn-press border-b-4 border-red-700 shadow-md">🗑️</button>
                        </div>
                    </div>
                    <div id="records-${friend.id}" class="hidden bg-zinc-800 p-6 border-t-4 border-zinc-600 transition-all">
                        <h4 class="text-2xl text-zinc-300 font-bold mb-4 flex items-center gap-2"><span>🎮</span> 近七天成績</h4>
                        ${recordsHtml}
                        <div class="mt-6 pt-4 border-t-2 border-zinc-600 text-center">
                            <button onclick="window.location.href='trophies.html?friend_id=${friend.id}&friend_name=${friend.name}'" class="w-full bg-yellow-600 text-white text-2xl font-bold py-4 rounded-2xl btn-press border-b-4 border-yellow-800 flex items-center justify-center gap-3 shadow-md">
                                <span>🏆</span> 查看他的獎盃室
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function toggleRecords(friendId) {
            const recordsDiv = document.getElementById(`records-${friendId}`);
            const arrow = document.getElementById(`arrow-${friendId}`);
            if (recordsDiv.classList.contains('hidden')) {
                recordsDiv.classList.remove('hidden');
                arrow.style.transform = "rotate(180deg)";
            } else {
                recordsDiv.classList.add('hidden');
                arrow.style.transform = "rotate(0deg)";
            }
        }

        // 接收好友邀請的攔截邏輯
        function checkPendingRequests() {
            if (pendingRequests.length > 0) {
                const request = pendingRequests[0];
                document.getElementById('requester-name').innerText = request.name;
                document.getElementById('requester-id').innerText = request.id;
                
                const modal = document.getElementById('modal-incoming-request');
                const content = document.getElementById('incoming-request-content');
                modal.classList.remove('hidden');
                setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
            }
        }

        async function acceptRequest() {
            const request = pendingRequests[0];
            try {
                const res = await fetch('/api/friends/accept', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requester_id: request.id, receiver_id: myUid })
                });
                const data = await res.json();
                if (data.success) {
                    pendingRequests.shift(); 
                    closeIncomingRequestModal();
                    await fetchFriendsData();
                    setTimeout(() => { showSystemModal("🎉", `您與「${request.name}」已成為好友！`, false, checkPendingRequests); }, 300);
                } else { showSystemModal("❌", "發生錯誤：" + data.message, false); }
            } catch (err) { showSystemModal("❌", "網路異常，請稍後再試", false); }
        }

        async function rejectRequest() {
            const request = pendingRequests[0];
            try {
                await fetch('/api/friends/remove', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user1_id: request.id, user2_id: myUid })
                });
                pendingRequests.shift();
                closeIncomingRequestModal();
                setTimeout(() => { checkPendingRequests(); }, 300);
            } catch (err) { console.error(err); }
        }

        function closeIncomingRequestModal() {
            const modal = document.getElementById('modal-incoming-request');
            const content = document.getElementById('incoming-request-content');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }

        // 送出邀請 (手動輸入號碼) 完整邏輯
        function openAddFriendModal() {
            document.getElementById('friend-uid-input').value = "";
            const modal = document.getElementById('modal-add-friend');
            const content = document.getElementById('add-friend-content');
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
        }
        function closeAddFriendModal() {
            const modal = document.getElementById('modal-add-friend');
            const content = document.getElementById('add-friend-content');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }

        async function processAddFriend() {
            const targetId = document.getElementById('friend-uid-input').value;
            if (!targetId) return showSystemModal("🤔", "請先輸入朋友的好友碼喔！", false);
            if (targetId === myUid) return showSystemModal("😅", "不能加自己為好友啦！", false);

            closeAddFriendModal();
            showSystemModal("⏳", "正在傳送交友邀請...", false);

            try {
                const res = await fetch('/api/friends/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requester_id: myUid, receiver_id: targetId })
                });
                const data = await res.json();
                if (data.success) { showSystemModal("✅", `已將邀請傳送給：${targetId}！`, false); } 
                else { showSystemModal("❌", "無法加入：" + data.message, false); }
            } catch (err) { showSystemModal("❌", "網路異常，請稍後再試", false); }
        }

        // 刪除好友
        function confirmDelete(friendId, friendName) {
            showSystemModal("🗑️", `確定要移除「${friendName}」嗎？`, true, async () => { 
                try {
                    const res = await fetch('/api/friends/remove', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user1_id: myUid, user2_id: friendId })
                    });
                    const data = await res.json();
                    if(data.success){
                        await fetchFriendsData();
                        showSystemModal("✅", "已成功移除好友！", false);
                    } else { showSystemModal("❌", "移除失敗：" + data.message, false); }
                } catch(err) { showSystemModal("❌", "網路異常，請稍後再試", false); }
            });
        }

        // 系統提示彈窗
        function showSystemModal(icon, message, isConfirm = false, onConfirm = null) {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('modal-message').innerText = message;
            
            const btnContainer = document.getElementById('modal-buttons');
            btnContainer.innerHTML = ""; 

            if (isConfirm) {
                const cancelBtn = document.createElement('button');
                cancelBtn.className = "flex-1 bg-zinc-600 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-zinc-800";
                cancelBtn.innerText = "取消";
                cancelBtn.onclick = closeSystemModal;

                const confirmBtn = document.createElement('button');
                confirmBtn.className = "flex-1 bg-red-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-red-700";
                confirmBtn.innerText = "確定";
                confirmBtn.onclick = () => {
                    closeSystemModal();
                    if (onConfirm) onConfirm();
                };
                btnContainer.appendChild(cancelBtn);
                btnContainer.appendChild(confirmBtn);
            } else {
                const okBtn = document.createElement('button');
                okBtn.className = "w-full bg-emerald-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-emerald-700";
                okBtn.innerText = "我知道了";
                okBtn.onclick = () => {
                    closeSystemModal();
                    if (onConfirm) onConfirm(); 
                };
                btnContainer.appendChild(okBtn);
            }
            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
        }
        function closeSystemModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }
    </script>
</body>
</html>
