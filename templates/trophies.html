<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂齡健康動 - 榮譽獎盃室</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Microsoft JhengHei', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-press {
            transition: transform 0.1s;
            box-shadow: 0 6px 0 rgba(0, 0, 0, 0.5);
        }
        .btn-press:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 rgba(0, 0, 0, 0.5);
        }
        /* 九宮格專屬按壓效果 */
        .grid-item {
            transition: all 0.15s ease-out;
        }
        .grid-item:active {
            transform: scale(0.95);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.8);
        }
        /* 隱藏卷軸 */
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative pb-10">

    <!-- 頂部導航 -->
    <div class="bg-zinc-800 p-4 sticky top-0 z-40 shadow-lg border-b-2 border-zinc-700 flex justify-between items-center">
        <button onclick="goBack()" class="btn-press bg-zinc-600 text-white px-6 py-3 rounded-2xl text-2xl font-bold border-b-4 border-zinc-800">
            〈 返回
        </button>
        <h1 class="text-3xl font-bold tracking-widest text-yellow-400" id="page-title">榮譽獎盃室</h1>
        <div class="w-24"></div> <!-- 排版佔位 -->
    </div>

    <!-- 主要內容區 -->
    <div class="flex-1 w-full max-w-md mx-auto p-6 flex flex-col items-center mt-4">
        
        <!-- 標題與說明 -->
        <div class="bg-zinc-800 rounded-3xl p-6 border-2 border-zinc-700 shadow-xl w-full text-center mb-8">
            <h2 class="text-3xl font-bold text-white mb-2 flex items-center justify-center gap-2">
                <span>👑</span> <span id="section-title">我的典藏</span>
            </h2>
            <p class="text-xl text-zinc-400 font-bold" id="section-desc">點擊空的格子可以擺放獎盃喔！</p>
        </div>

        <!-- 華麗九宮格展示區 -->
        <div class="grid grid-cols-3 gap-4 w-full bg-zinc-800 p-5 rounded-[2.5rem] shadow-2xl border-4 border-yellow-900/50 aspect-square">
            <!-- 模擬資料：未來這些格子會由 Python 資料庫生成 -->
            <button onclick="handleTrophyClick(1, '🥇', '全勤王者', '連續運動 7 天達成！')" class="grid-item bg-zinc-700 rounded-3xl flex justify-center items-center text-[4rem] shadow-inner border-2 border-zinc-600">🥇</button>
            <button onclick="handleTrophyClick(2, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
            <button onclick="handleTrophyClick(3, '🌟', '星級玩家', '總分突破 10,000 分！')" class="grid-item bg-zinc-700 rounded-3xl flex justify-center items-center text-[4rem] shadow-inner border-2 border-zinc-600">🌟</button>
            <button onclick="handleTrophyClick(4, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
            <button onclick="handleTrophyClick(5, '🏆', '太極宗師', '太極推手完美通關！')" class="grid-item bg-yellow-900/40 rounded-3xl flex justify-center items-center text-[4.5rem] shadow-inner border-4 border-yellow-600">🏆</button>
            <button onclick="handleTrophyClick(6, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
            <button onclick="handleTrophyClick(7, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
            <button onclick="handleTrophyClick(8, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
            <button onclick="handleTrophyClick(9, null, null, null)" class="grid-item bg-zinc-700/50 rounded-3xl flex justify-center items-center text-5xl shadow-inner border-2 border-dashed border-zinc-500 text-zinc-600">➕</button>
        </div>

    </div>

    <!-- 巨型彈窗：獎盃詳細資訊 / 編輯擺放 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/90 z-50 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-zinc-800 border-4 border-yellow-500 rounded-[2.5rem] w-full max-w-md p-8 text-center shadow-2xl transform transition-transform scale-95 flex flex-col gap-6" id="modal-content">
            
            <div class="text-[6rem] mb-2 drop-shadow-2xl" id="modal-icon">🏆</div>
            <h3 class="text-4xl font-bold text-white mb-2 tracking-wide" id="modal-title">獎盃名稱</h3>
            <p class="text-2xl text-zinc-300 font-bold mb-6" id="modal-desc">獎盃描述內容...</p>
            
            <div class="flex justify-center gap-4 mt-2" id="modal-buttons">
                <!-- 按鈕由 JS 動態生成 -->
            </div>
        </div>
    </div>

    <script>
        // 狀態變數：判斷是否為「唯讀模式」
        let isReadOnly = false;
        let returnTarget = "app_core.html"; // 預設返回大廳

        window.onload = () => {
            // 解析網址參數 (例如: trophies.html?friend_id=102&friend_name=王阿姨)
            const urlParams = new URLSearchParams(window.location.search);
            const friendName = urlParams.get('friend_name');

            if (friendName) {
                // 如果有帶入朋友名稱，進入【唯讀模式】
                isReadOnly = true;
                returnTarget = "friends.html"; // 從朋友列表來的，返回朋友列表
                
                document.getElementById('page-title').innerText = `${friendName} 的獎盃室`;
                document.getElementById('section-title').innerText = `${friendName} 的典藏`;
                document.getElementById('section-desc').innerText = `來看看他收集了哪些耀眼的榮耀！`;
            }
        };

        function goBack() {
            window.location.href = returnTarget;
        }

        // 處理九宮格點擊事件 (結合雙模式邏輯)
        function handleTrophyClick(slotIndex, icon, title, desc) {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            const btnContainer = document.getElementById('modal-buttons');
            
            btnContainer.innerHTML = ""; // 清空按鈕

            // 關閉按鈕 (所有模式共用)
            const closeBtn = document.createElement('button');
            closeBtn.className = "flex-1 bg-zinc-600 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-zinc-800";
            closeBtn.innerText = "關閉";
            closeBtn.onclick = closeModal;

            if (icon) {
                // 情境 1：格子裡有獎盃
                document.getElementById('modal-icon').innerText = icon;
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-title').className = "text-4xl font-bold text-yellow-400 mb-2 tracking-wide";
                document.getElementById('modal-desc').innerText = desc;

                btnContainer.appendChild(closeBtn);

                // 如果是自己的獎盃室，才顯示「卸下」功能
                if (!isReadOnly) {
                    const unequipBtn = document.createElement('button');
                    unequipBtn.className = "flex-1 bg-red-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-red-700";
                    unequipBtn.innerText = "卸下獎盃";
                    unequipBtn.onclick = () => {
                        alert(`(展示功能) 獎盃已從第 ${slotIndex} 格卸下！`);
                        closeModal();
                    };
                    btnContainer.appendChild(unequipBtn);
                }

            } else {
                // 情境 2：格子是空的
                document.getElementById('modal-icon').innerText = "📦";
                
                if (isReadOnly) {
                    // 朋友的空格子：只能看
                    document.getElementById('modal-title').innerText = "空空如也";
                    document.getElementById('modal-title').className = "text-4xl font-bold text-zinc-500 mb-2 tracking-wide";
                    document.getElementById('modal-desc').innerText = "這個展示櫃目前還沒有放獎盃喔！";
                    btnContainer.appendChild(closeBtn);
                } else {
                    // 自己的空格子：可以擺放
                    document.getElementById('modal-title').innerText = "空的展示櫃";
                    document.getElementById('modal-title').className = "text-4xl font-bold text-zinc-300 mb-2 tracking-wide";
                    document.getElementById('modal-desc').innerText = `這是您的第 ${slotIndex} 號展示櫃。\n快去倉庫挑選要擺放的獎盃吧！`;
                    
                    btnContainer.appendChild(closeBtn);
                    
                    const equipBtn = document.createElement('button');
                    equipBtn.className = "flex-1 bg-emerald-500 text-white text-3xl font-bold py-5 rounded-2xl btn-press border-b-8 border-emerald-700";
                    equipBtn.innerText = "挑選獎盃";
                    equipBtn.onclick = () => {
                        alert(`(展示功能) 開啟獎盃倉庫，準備擺放到第 ${slotIndex} 格！`);
                        closeModal();
                    };
                    btnContainer.appendChild(equipBtn);
                }
            }

            modal.classList.remove('hidden');
            setTimeout(() => content.classList.replace('scale-95', 'scale-100'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const content = document.getElementById('modal-content');
            content.classList.replace('scale-100', 'scale-95');
            setTimeout(() => modal.classList.add('hidden'), 150);
        }
    </script>
</body>
</html>
