<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>樂齡健康動 - 測量與監控</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Microsoft JhengHei', sans-serif; overflow-x: hidden; }
        .btn-press { transition: transform 0.1s; box-shadow: 0 6px 0 rgba(0, 0, 0, 0.5); }
        .btn-press:active:not(:disabled) { transform: translateY(4px); box-shadow: 0 2px 0 rgba(0, 0, 0, 0.5); }
        /* 沒電閃爍動畫 */
        @keyframes battery-blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .anim-blink { animation: battery-blink 1s infinite; }
    </style>
</head>
<body class="p-6 min-h-screen flex flex-col relative">

    <div class="flex justify-between items-center mb-6">
        <button onclick="window.location.href='app_core.html'" class="btn-press bg-zinc-700 text-white px-6 py-3 rounded-2xl text-xl font-bold border-b-4 border-zinc-900">
            〈 返回大廳
        </button>
        <h1 class="text-3xl font-bold tracking-widest text-indigo-400">設備測量中</h1>
        <div id="limb-tag" class="bg-indigo-900/50 px-4 py-2 rounded-xl text-indigo-400 font-bold border-2 border-indigo-500">偵測中...</div>
    </div>

    <div class="flex-1 flex flex-col gap-6 w-full max-w-2xl mx-auto">
        <div class="bg-zinc-800 border-4 border-indigo-500/50 rounded-[3rem] p-10 flex flex-col items-center shadow-2xl relative">
            <div id="bt-status-tag" class="absolute top-6 right-8 bg-zinc-700 px-4 py-2 rounded-xl text-red-400 font-bold border-2 border-red-900/50">未連線</div>
            
            <p id="status-hint" class="text-2xl text-zinc-400 font-bold mb-8">請啟動設備連線</p>

            <div class="bg-zinc-900 w-full py-12 rounded-[2.5rem] flex flex-col items-center justify-center mb-10 border-2 border-zinc-700 shadow-inner">
                <p class="text-zinc-500 font-bold mb-4 text-xl">目前即時角度</p>
                <div class="text-[8rem] font-black text-emerald-400 drop-shadow-[0_0_20px_rgba(52,211,153,0.3)]">
                    <span id="angle-display">0.0</span><span class="text-5xl ml-2">°</span>
                </div>
            </div>

            <button id="conn-btn" onclick="sensor.connect()" class="w-full bg-indigo-500 text-white text-3xl font-bold py-8 rounded-3xl btn-press border-b-8 border-indigo-700 mb-6 flex justify-center gap-4">
                <span>🔗</span> 啟動連線
            </button>
            <button onclick="sensor.zero()" class="w-full bg-emerald-500 text-white text-3xl font-bold py-8 rounded-3xl btn-press border-b-8 border-emerald-700 flex justify-center gap-4">
                <span>🎯</span> 設定歸零
            </button>
        </div>
    </div>

    <div id="battery-alert" class="fixed inset-0 bg-black/95 z-50 hidden flex items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-zinc-800 border-4 border-red-500 rounded-[3rem] w-full max-w-lg p-12 text-center shadow-[0_0_60px_rgba(239,68,68,0.4)] flex flex-col items-center">
            <div class="text-[10rem] mb-6 anim-blink">🪫</div>
            <h2 class="text-5xl font-black text-red-500 mb-6">設備電力不足</h2>
            <p class="text-2xl text-zinc-300 font-bold mb-2">或是設備已關閉</p>
            <p class="text-xl text-zinc-500 mb-12">請更換電池或重新開啟設備</p>
            
            <button onclick="window.location.reload()" class="w-full bg-emerald-500 text-white text-3xl font-bold py-7 rounded-2xl btn-press border-b-8 border-emerald-700 mb-6">
                換好電池了，重試
            </button>
            <button onclick="window.location.href='app_core.html'" class="w-full bg-zinc-700 text-white text-2xl font-bold py-5 rounded-2xl btn-press border-b-4 border-zinc-900">
                返回大廳
            </button>
        </div>
    </div>

    <script>
        const SERVICE_UUID = "00000001-0000-1000-8000-00805f9b34fb";
        const KEY_UUID     = "00000002-0000-1000-8000-00805f9b34fb";
        const DATA_UUID    = "00000003-0000-1000-8000-00805f9b34fb";

        const sensor = {
            device: null, charKey: null, smoothedAngle: null, alpha: 0.2,
            limb: localStorage.getItem('sensorLimb') || 'R', // 預設右手

            init() {
                const limbName = this.limb === 'L' ? '左手 (Left)' : '右手 (Right)';
                document.getElementById('limb-tag').innerText = `配戴位置：${limbName}`;
            },

            // 零延遲解碼
            hexToFloat(buffer) {
                const view = new DataView(buffer);
                return view.getFloat32(0, true);
            },

            async connect() {
                try {
                    this.updateStatus("搜尋中...", "#818cf8");
                    this.device = await navigator.bluetooth.requestDevice({
                        filters: [{ namePrefix: 'KneeHow' }], optionalServices: [SERVICE_UUID]
                    });

                    // ✨ 監聽斷線事件：當沒電或關機時會自動觸發
                    this.device.addEventListener('gattserverdisconnected', () => this.handleDisconnection());

                    const server = await this.device.gatt.connect();
                    const service = await server.getPrimaryService(SERVICE_UUID);
                    this.charKey = await service.getCharacteristic(KEY_UUID);
                    const dataChar = await service.getCharacteristic(DATA_UUID);

                    await dataChar.startNotifications();
                    dataChar.addEventListener('characteristicvaluechanged', (e) => {
                        const raw = this.hexToFloat(e.target.value.buffer);
                        if (this.smoothedAngle === null) this.smoothedAngle = raw;
                        else this.smoothedAngle = (1 - this.alpha) * this.smoothedAngle + this.alpha * raw;
                        
                        document.getElementById('angle-display').innerText = this.smoothedAngle.toFixed(1);
                        this.uploadData(this.smoothedAngle.toFixed(1));
                    });

                    await this.zero();
                    this.updateStatus("連線成功", "#34d399", true);
                } catch (err) {
                    this.updateStatus("未連線", "#f87171", false);
                }
            },

            handleDisconnection() {
                // 顯示巨大的沒電彈窗
                document.getElementById('battery-alert').classList.remove('hidden');
                this.updateStatus("設備斷線", "#ef4444", false);
            },

            async zero() {
                if (this.charKey) {
                    await this.charKey.writeValue(new Uint8Array([0x02, 0x01]));
                    this.smoothedAngle = null;
                }
            },

            updateStatus(text, color, isConnected) {
                const tag = document.getElementById('bt-status-tag');
                tag.innerText = text;
                tag.style.color = color;
                tag.style.borderColor = color;
                document.getElementById('status-hint').innerText = isConnected ? "數據正常傳輸中" : "請點擊下方按鈕連線";
                document.getElementById('conn-btn').disabled = isConnected;
            },

            async uploadData(angle) {
                // 自動根據 localStorage 的選擇對應資料庫名稱
                const tableName = `single_axis_sensor_${this.limb}`; 
                const dbUserId = localStorage.getItem('dbUserId');
                
                // 這裡可串接您的 app.py API
                // fetch('/api/record_angle', { ... });
                console.log(`數據上傳至: ${tableName}, 數值: ${angle}`);
            }
        };

        window.onload = () => sensor.init();
    </script>
</body>
</html>
